<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0" />
        <title>Naomi Tomoyoy | Linktree</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            purpleSoft: "#c3a6ff",
                            pinkSoft: "#ffb7d5",
                            textPurple: "#3a2e4f",
                        },
                    },
                },
            };
        </script>

        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Baloo+2:wght@500;600&display=swap"
            rel="stylesheet" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

        <style>
            body {
                font-family: "Poppins", sans-serif;
                user-select: none;
            }

            /* ===== BEAR ===== */
            .bear-wrap {
                position: relative;
            }

            .bear-svg {
                width: 145px;
                margin: auto;
                animation: float 4s ease-in-out infinite;
                transition: transform 0.35s ease;
            }

            .bear-svg.react {
                transform: rotate(-5deg) scale(1.07);
            }

            /* eyes */
            .eye {
                transform-origin: center;
                transition: transform 0.15s ease;
            }
            .eye.blink {
                transform: scaleY(0.1);
            }

            /* hand */
            .hand-wave {
                will-change: transform;
            }
            .hand-wave.active {
                animation: wave 0.8s ease-in-out infinite;
            }

            /* ===== CUTER BUBBLE ===== */
            .bubble {
                position: absolute;
                top: -46px;
                left: 50%;
                transform: translateX(-50%) scale(0.9);
                background: linear-gradient(180deg, #fff, #f7f2ff);
                padding: 8px 14px;
                border-radius: 18px;
                font-family: "Baloo 2", cursive;
                font-size: 12px;
                color: #6b4fcf;
                box-shadow:
                    0 8px 18px rgba(151, 99, 255, 0.25),
                    inset 0 -2px 0 rgba(255, 183, 213, 0.6);
                opacity: 0;
                animation: bubbleCute 6s ease-in-out infinite;
                white-space: nowrap;
            }

            .bubble::after {
                content: "";
                position: absolute;
                bottom: -6px;
                left: 50%;
                transform: translateX(-50%);
                width: 12px;
                height: 12px;
                background: #fff;
                transform: translateX(-50%) rotate(45deg);
            }

            @keyframes bubbleCute {
                0% {
                    opacity: 0;
                    transform: translate(-50%, 12px) scale(0.85);
                }

                20% {
                    opacity: 1;
                    transform: translate(-50%, -2px) scale(1.05);
                }

                70% {
                    opacity: 1;
                    transform: translate(-50%, 0) scale(1);
                }

                100% {
                    opacity: 0;
                    transform: translate(-50%, 10px) scale(0.9);
                }
            }

            /* animations */
            @keyframes float {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-9px);
                }
            }

            @keyframes wave {
                0% {
                    transform: rotate(0deg);
                }
                30% {
                    transform: rotate(28deg);
                }
                60% {
                    transform: rotate(-10deg);
                }
                100% {
                    transform: rotate(0deg);
                }
            }
        </style>
    </head>

    <body
        class="min-h-screen flex items-center justify-center bg-gradient-to-b from-purpleSoft to-pinkSoft text-textPurple">
        <main class="w-full max-w-[420px] px-5 py-8 text-center">
            <!-- Avatar -->
            <div
                class="w-[120px] h-[120px] mx-auto mb-4 rounded-full bg-white overflow-hidden shadow-[0_0_25px_rgba(255,255,255,.6)]">
                <img
                    src="./tomoyoy.png"
                    class="w-full h-full object-cover" />
            </div>

            <h1 class="text-2xl font-semibold mb-1">Naomi Tomoyoy 💜</h1>
            <p class="text-sm opacity-90 mb-14">
                Haiii~ aku temen online kamu ✨<br />
                nongkrong, nyanyi, dan ketawa bareng~
            </p>

            <!-- BEAR -->
            <div class="bear-wrap">
                <div class="bubble">haiii~ kamu dateng 🧸💜</div>

                <svg
                    id="bear"
                    class="bear-svg"
                    viewBox="-5 0 120 130">
                    <defs>
                        <!-- SUPER SMOOTH GRADIENT -->
                        <linearGradient
                            id="bearGradient"
                            x1="0%"
                            y1="0%"
                            x2="100%"
                            y2="0%">
                            <stop
                                offset="0%"
                                stop-color="#ffffff" />
                            <stop
                                offset="50%"
                                stop-color="#EDEDED" />
                            <stop
                                offset="100%"
                                stop-color="#B0B0B0" />
                            <stop
                                offset="100%"
                                stop-color="#808080" />
                        </linearGradient>

                        <!-- SOFT SHADOW -->
                        <filter
                            id="bearShadow"
                            x="-40%"
                            y="-40%"
                            width="180%"
                            height="180%">
                            <feDropShadow
                                dx="0"
                                dy="8"
                                stdDeviation="10"
                                flood-color="rgba(151,99,255,.35)" />
                        </filter>
                    </defs>

                    <!-- ears -->
                    <circle
                        cx="38"
                        cy="32"
                        r="16"
                        fill="url(#bearGradient)"
                        filter="url(#bearShadow)" />
                    <circle
                        cx="82"
                        cy="32"
                        r="16"
                        fill="url(#bearGradient)"
                        filter="url(#bearShadow)" />

                    <!-- head -->
                    <circle
                        cx="60"
                        cy="68"
                        r="42"
                        fill="url(#bearGradient)"
                        filter="url(#bearShadow)" />

                    <!-- blush -->
                    <ellipse
                        cx="44"
                        cy="78"
                        rx="6"
                        ry="4"
                        fill="#ffd1e6"
                        opacity=".8" />
                    <ellipse
                        cx="76"
                        cy="78"
                        rx="6"
                        ry="4"
                        fill="#ffd1e6"
                        opacity=".8" />

                    <!-- eyes -->
                    <g class="eye">
                        <circle
                            cx="48"
                            cy="66"
                            r="6"
                            fill="#3a2e4f" />
                        <circle
                            cx="50"
                            cy="64"
                            r="2"
                            fill="#fff" />
                    </g>
                    <g class="eye">
                        <circle
                            cx="72"
                            cy="66"
                            r="6"
                            fill="#3a2e4f" />
                        <circle
                            cx="74"
                            cy="64"
                            r="2"
                            fill="#fff" />
                    </g>

                    <!-- mouth -->
                    <path
                        d="M52 78 Q60 84 68 78"
                        stroke="#3a2e4f"
                        stroke-width="3"
                        fill="none"
                        stroke-linecap="round" />

                    <!-- LEFT HAND -->
                    <g
                        id="hand"
                        class="hand-wave"
                        style="
                            transform-origin: 18px 82px;
                            transform-box: fill-box;
                        ">
                        <circle
                            cx="18"
                            cy="82"
                            r="11"
                            fill="url(#bearGradient)" />
                    </g>

                    <!-- right hand -->
                    <circle
                        cx="102"
                        cy="82"
                        r="11"
                        fill="url(#bearGradient)" />
                </svg>
            </div>

            <!-- LINKS -->
            <div
                id="link-list"
                class="flex flex-col gap-4"></div>
            <!-- Footer -->
            <div class="mt-9 text-xs opacity-80">
                Makasih ya udah mampir 💜<br />
                kalau kangen… balik lagi aja~<br />
                <span class="text-[6px]">Created By STUNT</span>
            </div>
        </main>

        <script>
            const bubble = document.querySelector(".bubble");

            const bubbletexts = [
                "Welcome Semuanya 🧸💜",
                "aku seneng kalian mampir ✨",
                "jangan lupa senyum ya~ 💖",
            ];

            let bubbleIndex = 0;

            function cycleBubbleText() {
                bubble.textContent = bubbletexts[bubbleIndex];
                bubbleIndex = (bubbleIndex + 1) % bubbletexts.length;
            }

            // pertama kali muncul
            cycleBubbleText();

            // ganti teks setiap 6 detik (sesuai animasi bubbleCute)
            setInterval(cycleBubbleText, 6000);

            // Blinking eyes
            function randomBlink() {
                const eyes = document.querySelectorAll(".eye");
                eyes.forEach((e) => e.classList.add("blink"));
                setTimeout(
                    () => eyes.forEach((e) => e.classList.remove("blink")),
                    140,
                );
                setTimeout(randomBlink, Math.random() * 4000 + 2500);
            }
            randomBlink();

            // Links data + Wave hand on hover
            const bear = document.getElementById("bear");
            const hand = document.getElementById("hand");

            const links = [
                {
                    name: "Saweria",
                    url: "https://saweria.co/naomitomoyoy",
                    icon: "fa-solid fa-heart",
                },
                {
                    name: "Trakteer",
                    url: "https://trakteer.id/tomoyoy",
                    icon: "fa-solid fa-mug-hot",
                },
                {
                    name: "Discord",
                    url: "https://discord.gg/Z3AnXVUuak",
                    icon: "fa-brands fa-discord",
                },
                {
                    name: "Instagram",
                    url: "https://www.instagram.com/naomi_tomoyoy",
                    icon: "fa-brands fa-instagram",
                },
                {
                    name: "YouTube",
                    url: "https://www.youtube.com/@tomoyoy_oy",
                    icon: "fa-brands fa-youtube",
                },
                {
                    name: "Spotify",
                    url: "https://open.spotify.com/user/31oqoygzqrxjco3apycvxayazdkq",
                    icon: "fa-brands fa-spotify",
                },
                {
                    name: "TikTok",
                    url: "https://www.tiktok.com/@moyoy.oy",
                    icon: "fa-brands fa-tiktok",
                },
                {
                    name: "SoundCloud",
                    url: "https://soundcloud.com/naomi-tomoyoy",
                    icon: "fa-brands fa-soundcloud",
                },
                {
                    name: "X (Twitter)",
                    url: "https://x.com/naothara_sella",
                    icon: "fa-brands fa-x-twitter",
                },
            ];

            const container = document.getElementById("link-list");

            links.forEach((item) => {
                const a = document.createElement("a");
                a.href = item.url;
                a.target = "_blank";
                a.className = `
        flex items-center gap-4 px-5 py-3
        rounded-full bg-white/90
        font-medium text-textPurple
        shadow-lg transition-all duration-300
        hover:-translate-y-1 hover:scale-[1.02]
    `;
                a.innerHTML = `<i class="${item.icon} w-5"></i><span>${item.name}</span>`;

                a.onmouseenter = () => {
                    bear.classList.add("react");
                    hand.classList.add("active");
                };
                a.onmouseleave = () => {
                    bear.classList.remove("react");
                    hand.classList.remove("active");
                };

                container.appendChild(a);
            });
        </script>
    </body>
</html>
